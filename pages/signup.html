<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/signup.css">
    <link rel="shortcut icon" href="../media/Logo.png" type="image/x-icon">
    <title>INSTITUCIÓN EDUCATIVA ABC</title>
</head>
<body>
    <div class="container">
    <h1>INSTITUCIÓN EDUCATIVA ABC</h1>
    <!-- <h2>Login</h2> -->
    <img src="../media/Logo.png" class="imagen">
    <div class="min_container">
        <div>
            <label for= "email">Email:</label><br>
            <input type="email" class="input" id="email" name="email" required><br><br>
        </div>
        <div>
            <label for="username">Nombre:</label><br>
            <input type="text" class="input" id="username" name="username" required><br><br>
        </div>
        <div>
            <label for="identificacion">Cedula:</label><br>
            <input type="text" class="input" id="identificacion" name="identificacion"><br><br>
        </div>
        <div>
            <label for="birthdate">Fecha de nacimiento:</label><br>
            <input type="date" class="input" id="birthdate" name="birthdate" max="2026-03-03" required><br><br>
        </div>
        <div>
            <label for="password">Contraseña:</label><br>
            <input type="password" class="input" id="password" name="password" required><br><br>
        </div>
        
    </div>
    <button type="submit" class="iniciar_sesión">Registrarte</button>
    <br>
    <a href="./login.html">
        <button class="iniciar_sesión" id="singup">
            Ya tienes una cuenta?
            ¡Incia seción!
        </button>    
    </a>
    </div>
</body>
<script src="../scripts/singup.js"></script>
</html>
