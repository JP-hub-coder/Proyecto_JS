<html lang="en">

</head>
<body>

        <h1>INSTITUCIÓN EDUCATIVA ABC</h1>

            <label for="username">Usuario:</label><br>

            <label for="password">Contraseña:</label><br>

        </div>
        <br>
        <button  type="submit"  class="iniciar_sesion" id="ingresar" >Iniciar sesión</button>
        <br>
        <a href="./signup.html">
            <button class="iniciar_sesion" id="singup">
                No tienes una cuenta? ¡Registrate con nosotros!            
            </button>
        </a>
    </div>
</body>
<script src="../scripts/login.js"></script>
</html>
